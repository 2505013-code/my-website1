<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>三色駒バトル：相対パス分割版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="status-display">P1 & P2 駒を選択</div>

    <div class="container">
        <div class="player-box" id="p1-box">
            <div class="gauge-area">
                <div style="display:flex; justify-content:space-between; font-size:10px;"><span>P1</span><span id="p1-gauge-label">ALL:1.0</span></div>
                <div class="gauge-bar"><div id="p1-gauge-fill" class="gauge-fill"></div></div>
            </div>
            <div id="p1-controls" class="controls"></div>
            <div id="p1-status" class="status-text">WAITING...</div>
        </div>

        <div class="player-box" id="p2-box">
            <div class="gauge-area">
                <div style="display:flex; justify-content:space-between; font-size:10px;"><span>P2</span><span id="p2-gauge-label">ALL:1.0</span></div>
                <div class="gauge-bar"><div id="p2-gauge-fill" class="gauge-fill"></div></div>
            </div>
            <div id="p2-controls" class="controls"></div>
            <div id="p2-status" class="status-text">WAITING...</div>
        </div>
    </div>

    <div id="overlay">
        <div id="countdown-num">5</div>
        <div id="final-result"></div>
        <button id="next-btn" onclick="closeOverlay()">NEXT</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
